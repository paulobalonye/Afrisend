#cloud-config
# Cloud-init configuration for AfriSend dev VM
# Runs once on first boot to install Docker and Docker Compose

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git

runcmd:
  # Install Docker CE
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Add azureuser to docker group (no sudo needed for docker commands)
  - usermod -aG docker azureuser

  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Create application directory
  - mkdir -p /opt/afrisend
  - chown azureuser:azureuser /opt/afrisend

final_message: "AfriSend dev VM bootstrap complete. Docker and Docker Compose are ready."
