_format_version: "3.0"
_transform: true

# ─────────────────────────────────────────────────────────────────────────────
# AfriSend API Gateway — Kong Declarative Configuration
#
# Apply to a running Kong instance:
#   deck gateway sync kong/kong.yml
#
# Routes all /v1/* traffic and /health to the Express backend.
# Plugins applied at service level unless noted.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Main backend service ──────────────────────────────────────────────────
  - name: afrisend-backend
    host: backend
    port: 3000
    protocol: http
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000

    routes:
      # Public: health check (no auth required)
      - name: health-check
        paths:
          - /health
        methods:
          - GET
        strip_path: false
        plugins:
          - name: jwt
            enabled: false

      # Public: auth endpoints (register, login, MFA, token refresh)
      - name: auth-routes
        paths:
          - /v1/auth
        strip_path: false
        plugins:
          # Disable JWT validation for auth endpoints — users aren't logged in yet
          - name: jwt
            enabled: false
          # Tighter rate limit on auth endpoints to slow brute-force
          - name: rate-limiting
            config:
              minute: 20
              hour: 200
              policy: local
              limit_by: ip

      # Protected: all other v1 routes require a valid JWT
      - name: users-routes
        paths:
          - /v1/users
        strip_path: false

      - name: kyc-routes
        paths:
          - /v1/kyc
        strip_path: false

      - name: remittance-routes
        paths:
          - /v1/remittance
        strip_path: false

      - name: bank-routes
        paths:
          - /v1/bank
        strip_path: false

      - name: payment-webhook-routes
        paths:
          - /v1/payment
        strip_path: false
        plugins:
          # Webhooks are validated by provider signatures, not user JWTs
          - name: jwt
            enabled: false

      - name: transaction-routes
        paths:
          - /v1/transactions
        strip_path: false

# ─────────────────────────────────────────────────────────────────────────────
# Global plugins — applied to all services unless overridden at route level
# ─────────────────────────────────────────────────────────────────────────────
plugins:
  # ── JWT validation (RS256) ────────────────────────────────────────────────
  # Applied globally; individual routes can disable with `enabled: false`
  - name: jwt
    service: afrisend-backend
    config:
      # Only RS256 is accepted — matches Auth Service token issuance
      allowed_algorithms:
        - RS256
      # Header: Authorization: Bearer <token>
      header_names:
        - authorization
      # Allow unauthenticated requests to pass through to routes that have
      # jwt disabled (auth, health, webhooks). Those routes override this
      # plugin with enabled: false, so anonymous is not needed globally.
      claims_to_verify:
        - exp
      key_claim_name: kid

  # ── Rate limiting (token bucket) ─────────────────────────────────────────
  # Global default; auth route overrides with stricter limits above
  - name: rate-limiting
    config:
      minute: 120
      hour: 2000
      day: 20000
      policy: local
      limit_by: consumer
      fault_tolerant: true
      hide_client_headers: false
      error_code: 429
      error_message: "Rate limit exceeded. Please slow down."

  # ── Request logging (sanitized — no PII) ─────────────────────────────────
  # http-log ships structured JSON to a log aggregator endpoint.
  # Sensitive headers (Authorization, Cookie) and PII body fields are
  # stripped by the request-transformer plugin applied before logging.
  - name: http-log
    config:
      http_endpoint: "http://localhost:9999/kong-logs"
      method: POST
      timeout: 1000
      keepalive: 60000
      flush_timeout: 2
      retry_count: 3
      custom_fields_by_lua:
        # Scrub Authorization header from logged request to avoid token leakage
        request.headers.authorization: "return 'REDACTED'"
        request.headers.cookie: "return 'REDACTED'"

  # ── CORS ─────────────────────────────────────────────────────────────────
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Requested-With
        - X-Idempotency-Key
      exposed_headers:
        - X-Request-Id
      credentials: false
      max_age: 3600
      preflight_continue: false

  # ── Request ID injection ──────────────────────────────────────────────────
  # Injects X-Request-Id header for distributed tracing
  - name: correlation-id
    config:
      header_name: X-Request-Id
      generator: uuid#counter
      echo_downstream: true
