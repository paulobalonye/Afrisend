version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: afrisend_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: afrisend_dev
      POSTGRES_USER: afrisend
      POSTGRES_PASSWORD: afrisend_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/server/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afrisend -d afrisend_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: afrisend_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Kong database (dedicated PostgreSQL instance) ─────────────────────────
  kong-db:
    image: postgres:15-alpine
    container_name: afrisend_kong_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kong_dev_password
    volumes:
      - kong_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kong -d kong']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kong DB migrations (one-shot) ─────────────────────────────────────────
  kong-migrations:
    image: kong:3.6-ubuntu
    container_name: afrisend_kong_migrations
    command: kong migrations bootstrap
    restart: on-failure
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PORT: 5432
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_dev_password
    depends_on:
      kong-db:
        condition: service_healthy

  # ── Kong API Gateway ──────────────────────────────────────────────────────
  kong:
    image: kong:3.6-ubuntu
    container_name: afrisend_kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PORT: 5432
      KONG_PG_DATABASE: kong
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong_dev_password
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: '0.0.0.0:8001'
      KONG_PROXY_LISTEN: '0.0.0.0:8000'
      KONG_DECLARATIVE_CONFIG: ''
    ports:
      - '8000:8000'   # Kong proxy — all client traffic
      - '8001:8001'   # Kong admin API — local dev only
    depends_on:
      kong-db:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'kong', 'health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./kong:/etc/kong:ro

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: afrisend_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://afrisend:afrisend_dev_password@postgres:5432/afrisend_dev
      REDIS_URL: redis://redis:6379
    # Port 3000 is intentionally NOT exposed to the host.
    # All external traffic must flow through Kong on port 8000.
    expose:
      - '3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: afrisend_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9090/-/healthy || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Alertmanager ─────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: afrisend_alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - '9093:9093'
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    environment:
      PAGERDUTY_INTEGRATION_KEY_CRITICAL: ${PAGERDUTY_INTEGRATION_KEY_CRITICAL:-placeholder}
      PAGERDUTY_INTEGRATION_KEY_WARNING: ${PAGERDUTY_INTEGRATION_KEY_WARNING:-placeholder}
    depends_on:
      - prometheus

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: afrisend_grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-afrisend_grafana}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── OpenTelemetry Collector ───────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: afrisend_otel_collector
    restart: unless-stopped
    command: ['--config=/etc/otel-collector-config.yml']
    volumes:
      - ./monitoring/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - '4317:4317'   # OTLP gRPC
      - '4318:4318'   # OTLP HTTP
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  kong_db_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
