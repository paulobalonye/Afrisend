groups:
  - name: afrisend-transactions
    interval: 60s
    rules:
      - alert: HighTransactionFailureRate
        expr: |
          (
            rate(transaction_failure_total[5m])
            /
            (rate(transaction_success_total[5m]) + rate(transaction_failure_total[5m]) + 0.0001)
          ) > 0.02
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Transaction failure rate exceeds 2%"
          description: >
            Transaction failure rate is {{ printf "%.2f" $value | humanizePercentage }}
            over the last 5 minutes. SLA threshold is 2%.
          runbook_url: https://runbooks.afrisend.com/transaction-failure-spike

      - alert: PayoutProviderDown
        expr: |
          rate(transaction_failure_total{reason="provider_error"}[5m]) > 0
          and
          rate(transaction_success_total[5m]) == 0
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Payout provider appears to be down"
          description: >
            No successful transactions in 3 minutes with active provider errors.
            Check payout provider status dashboards.
          runbook_url: https://runbooks.afrisend.com/payout-provider-down

  - name: afrisend-api-gateway
    interval: 30s
    rules:
      - alert: APIGatewayHighLatency
        expr: |
          histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "API gateway p99 latency exceeds 500ms"
          description: >
            p99 request duration is {{ $value | humanizeDuration }} over the last 5 minutes.
            SLA target: < 500ms p99.
          runbook_url: https://runbooks.afrisend.com/api-gateway-latency

      - alert: APIGatewayHighErrorRate
        expr: |
          rate(http_requests_total{status_code=~"5.."}[5m])
          /
          rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "API gateway 5xx error rate exceeds 1%"
          description: >
            5xx error rate is {{ printf "%.2f" $value | humanizePercentage }} over 5 minutes.

  - name: afrisend-database
    interval: 60s
    rules:
      - alert: DatabaseConnectionPoolSaturation
        expr: db_connection_pool_used / db_connection_pool_max > 0.8
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "Database connection pool usage exceeds 80%"
          description: >
            Connection pool is {{ printf "%.0f" ($value * 100) }}% utilised.
            Risk of connection exhaustion and request timeouts.
          runbook_url: https://runbooks.afrisend.com/db-pool-saturation

      - alert: DatabaseConnectionPoolExhausted
        expr: db_connection_pool_used / db_connection_pool_max >= 1.0
        for: 1m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "Database connection pool exhausted"
          description: >
            All database connections are in use. New requests will fail immediately.

  - name: afrisend-sla
    interval: 5m
    rules:
      - alert: UptimeSLABreach
        expr: |
          avg_over_time(up{job="afrisend-backend"}[1h]) < 0.999
        for: 0m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "Uptime SLA breach: below 99.9% in last hour"
          description: >
            Service availability is {{ printf "%.3f" $value | humanizePercentage }}
            over the last hour. SLA target: 99.9%.
