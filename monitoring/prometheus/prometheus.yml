global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - alerts/afrisend.yml

scrape_configs:
  - job_name: afrisend-backend
    static_configs:
      - targets:
          - backend:3000
    metrics_path: /metrics
    scheme: http

  - job_name: kong-gateway
    static_configs:
      - targets:
          - kong:8001
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121
