global:
  resolve_timeout: 5m
  pagerduty_url: https://events.pagerduty.com/v2/enqueue

route:
  receiver: pagerduty-critical
  group_by: [alertname, severity, team]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = critical
      receiver: pagerduty-critical
      continue: false
    - matchers:
        - severity = warning
      receiver: pagerduty-warning
      continue: false

receivers:
  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_INTEGRATION_KEY_CRITICAL}
        send_resolved: true
        severity: critical
        client: AfriSend Alertmanager
        client_url: http://grafana:3000
        description: >
          [CRITICAL] {{ .CommonAnnotations.summary }}
        details:
          description: "{{ .CommonAnnotations.description }}"
          runbook: "{{ .CommonAnnotations.runbook_url }}"

  - name: pagerduty-warning
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_INTEGRATION_KEY_WARNING}
        send_resolved: true
        severity: warning
        client: AfriSend Alertmanager
        client_url: http://grafana:3000
        description: >
          [WARNING] {{ .CommonAnnotations.summary }}

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, team]
