# docker-compose.azure-dev.yml
# Docker Compose override for Azure dev VM deployment.
# Used together with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.azure-dev.yml up -d
#
# Changes from the base file:
#   - NODE_ENV set to development (dev/staging behaviour, not prod)
#   - Backend built from source (not a prebuilt registry image)
#   - Kong admin port bound to 127.0.0.1 only (not publicly exposed)
#   - Alertmanager PagerDuty keys loaded from env (not placeholder)
#   - Grafana admin credentials loaded from env

version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://afrisend:afrisend_dev_password@postgres:5432/afrisend_dev
      REDIS_URL: redis://redis:6379
    restart: unless-stopped

  kong:
    environment:
      # Use Docker's embedded DNS server to fix Lua-level DNS resolution on Azure VMs
      KONG_DNS_RESOLVER: "127.0.0.11"
    # Small startup delay to ensure Docker network interface is fully up before
    # Kong's init_by_lua fires its first DNS lookup (Azure VM race condition fix)
    command: >
      sh -c "sleep 5 && /docker-entrypoint.sh kong docker-start"
    # NOTE: port 8001 (Kong admin) is intentionally NOT listed here.
    # Docker Compose merges port arrays from base + override — listing 127.0.0.1:8001
    # alongside the base 0.0.0.0:8001 causes a double-bind error.
    # The Azure NSG already blocks port 8001 from the internet (DenyAllInbound at priority 4096),
    # so the base 8001:8001 binding is safe without an additional override.
    restart: unless-stopped

  grafana:
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-afrisend_grafana_dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
    restart: unless-stopped

  alertmanager:
    environment:
      PAGERDUTY_INTEGRATION_KEY_CRITICAL: ${PAGERDUTY_INTEGRATION_KEY_CRITICAL:-disabled}
      PAGERDUTY_INTEGRATION_KEY_WARNING: ${PAGERDUTY_INTEGRATION_KEY_WARNING:-disabled}
    restart: unless-stopped
